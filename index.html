<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chemistry Quiz â€” Joel's Revision Pack</title>
<style>
  :root {
    --bg: #0f1424;
    --panel: #181f36;
    --panel2: #232c4a;
    --accent: #4f8cff;
    --accent-2: #f9c74f;
    --good: #43d17a;
    --bad: #ff5d6c;
    --text: #e8ecf6;
    --muted: #98a2c2;
    --border: #2a335a;
    --paul: #4f8cff;
    --shelley: #f9c74f;
    --rushmore: #43d17a;
    --vicky: #ff7eb3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 24px 18px 80px; }
  header { margin-bottom: 18px; }
  h1 { margin: 0 0 4px; font-size: 28px; letter-spacing: -0.5px; }
  .sub { color: var(--muted); font-size: 14px; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
  }

  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .mode-toggle { display: inline-flex; background: var(--panel2); border-radius: 10px; overflow: hidden; }
  .mode-toggle button {
    background: transparent; color: var(--muted); border: none;
    padding: 9px 18px; font-weight: 600; cursor: pointer; font-size: 14px;
  }
  .mode-toggle button.active { background: var(--accent); color: white; }

  .filter-row { margin-top: 10px; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip {
    padding: 6px 11px; border-radius: 999px; background: var(--panel2);
    border: 1px solid var(--border); color: var(--muted); cursor: pointer;
    font-size: 13px; user-select: none; transition: all 0.15s;
  }
  .chip:hover { color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: white; }
  .chip.lecturer-paul.active     { background: var(--paul);     border-color: var(--paul); }
  .chip.lecturer-shelley.active  { background: var(--shelley);  border-color: var(--shelley); color: #1a1a1a; }
  .chip.lecturer-rushmore.active { background: var(--rushmore); border-color: var(--rushmore); color: #1a1a1a; }
  .chip.lecturer-vicky.active    { background: var(--vicky);    border-color: var(--vicky); }

  .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; }

  .stats {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 10px;
  }
  .stat {
    background: var(--panel2); border-radius: 10px; padding: 10px 12px; text-align: center;
  }
  .stat .n { font-size: 22px; font-weight: 700; }
  .stat .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }

  .card-area {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 24px;
    min-height: 320px;
    position: relative;
  }
  .meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag {
    font-size: 11px; padding: 3px 9px; border-radius: 999px;
    background: var(--panel2); color: var(--muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tag.recall { background: rgba(79,140,255,0.18); color: #9ec3ff; }
  .tag.applied { background: rgba(249,201,79,0.18); color: var(--accent-2); }
  .tag.lec-paul     { background: rgba(79,140,255,0.18); color: #9ec3ff; }
  .tag.lec-shelley  { background: rgba(249,201,79,0.18); color: var(--accent-2); }
  .tag.lec-rushmore { background: rgba(67,209,122,0.18); color: var(--good); }
  .tag.lec-vicky    { background: rgba(255,126,179,0.18); color: var(--vicky); }

  .question { font-size: 20px; font-weight: 600; margin-bottom: 18px; line-height: 1.4; }

  .answer-box {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-top: 14px;
    font-size: 17px;
    color: var(--text);
    white-space: pre-line;
  }
  .answer-box.hidden { display: none; }

  .options { display: grid; gap: 9px; margin-top: 8px; }
  .option {
    background: var(--panel2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    text-align: left;
    cursor: pointer;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .option:hover:not(:disabled) { border-color: var(--accent); background: #283163; }
  .option:disabled { cursor: default; }
  .option.correct { border-color: var(--good); background: rgba(67,209,122,0.18); }
  .option.wrong { border-color: var(--bad); background: rgba(255,93,108,0.18); }
  .option.reveal-correct { border-color: var(--good); }

  .feedback { margin-top: 12px; font-weight: 600; min-height: 22px; }
  .feedback.good { color: var(--good); }
  .feedback.bad { color: var(--bad); }

  .actions { margin-top: 22px; display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    background: var(--accent); color: white; border: none; border-radius: 10px;
    padding: 11px 18px; font-weight: 600; font-size: 14px; cursor: pointer;
    font-family: inherit;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn.secondary { background: var(--panel2); color: var(--text); border: 1px solid var(--border); }
  .btn.good { background: var(--good); color: #0c2818; }
  .btn.bad { background: var(--bad); color: white; }
  .btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }

  .empty {
    text-align: center; color: var(--muted); padding: 40px 20px;
  }

  .progress {
    height: 6px; background: var(--panel2); border-radius: 999px;
    overflow: hidden; margin-top: 8px;
  }
  .progress-bar {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--good));
    transition: width 0.3s;
  }

  .footer-help {
    text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px;
  }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .question { font-size: 18px; }
    .wrap { padding: 16px 12px 60px; }
  }
</style>
</head>

</div>

// =====================================================================
// APP STATE
// =====================================================================
let mode = "flashcard";   // or "quiz"
let activeLecturers = new Set(); // empty = all
let activeTopics = new Set();    // empty = all
let activeDifficulty = "all";    // or "recall" / "applied"
let pool = [];          // filtered + shuffled questions
let pos = 0;
let answered = false;
let stats = { correct: 0, wrong: 0, seen: 0 };

// Build lecturer/topic indexes
const LECTURERS = [...new Set(QUESTIONS.map(q => q.lec))];
const TOPICS_BY_LEC = {};
LECTURERS.forEach(l => TOPICS_BY_LEC[l] = [...new Set(QUESTIONS.filter(q => q.lec === l).map(q => q.topic))]);
const ALL_TOPICS = [...new Set(QUESTIONS.map(q => q.topic))];

// =====================================================================
// RENDERING
// =====================================================================
function $(id) { return document.getElementById(id); }

function renderChips() {
  const lecCont = $("lecturer-chips");
  lecCont.innerHTML = "";
  LECTURERS.forEach(l => {
    const b = document.createElement("button");
    b.className = `chip lecturer-${l.toLowerCase()}` + (activeLecturers.has(l) ? " active" : "");
    b.textContent = l + ` (${QUESTIONS.filter(q => q.lec === l).length})`;
    b.onclick = () => {
      if (activeLecturers.has(l)) activeLecturers.delete(l);
      else activeLecturers.add(l);
      // Remove topic filters that no longer apply
      [...activeTopics].forEach(t => {
        const lecOfTopic = QUESTIONS.find(q => q.topic === t).lec;
        if (activeLecturers.size > 0 && !activeLecturers.has(lecOfTopic)) activeTopics.delete(t);
      });
      rebuild();
    };
    lecCont.appendChild(b);
  });

  const topicCont = $("topic-chips");
  topicCont.innerHTML = "";
  // Show topics for the active lecturers (or all if none selected)
  let topicsToShow = activeLecturers.size === 0
    ? ALL_TOPICS
    : ALL_TOPICS.filter(t => activeLecturers.has(QUESTIONS.find(q => q.topic === t).lec));
  topicsToShow.forEach(t => {
    const b = document.createElement("button");
    b.className = "chip" + (activeTopics.has(t) ? " active" : "");
    b.textContent = t;
    b.onclick = () => {
      if (activeTopics.has(t)) activeTopics.delete(t);
      else activeTopics.add(t);
      rebuild();
    };
    topicCont.appendChild(b);
  });

  // Difficulty chips
  document.querySelectorAll('#difficulty-chips .chip').forEach(c => {
    c.classList.toggle("active", c.dataset.diff === activeDifficulty);
    c.onclick = () => { activeDifficulty = c.dataset.diff; rebuild(); };
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function rebuild() {
  pool = QUESTIONS.filter(q => {
    if (activeLecturers.size > 0 && !activeLecturers.has(q.lec)) return false;
    if (activeTopics.size > 0 && !activeTopics.has(q.topic)) return false;
    if (activeDifficulty !== "all" && q.type !== activeDifficulty) return false;
    return true;
  });
  pool = shuffle(pool);
  pos = 0;
  answered = false;
  renderChips();
  renderCard();
}

function renderStats() {
  $("stat-pos").textContent = pool.length === 0 ? "0/0" : `${pos + 1}/${pool.length}`;
  $("stat-correct").textContent = stats.correct;
  $("stat-wrong").textContent = stats.wrong;
  const total = stats.correct + stats.wrong;
  $("stat-acc").textContent = total === 0 ? "â€”" : Math.round(100 * stats.correct / total) + "%";
  $("progress").style.width = (pool.length === 0 ? 0 : ((pos + 1) / pool.length * 100)) + "%";
}

function renderCard() {
  renderStats();
  const area = $("card-area");
  if (pool.length === 0) {
    area.innerHTML = `<div class="empty">No questions match your filters. Try clearing some.</div>`;
    return;
  }
  const q = pool[pos];
  const lecTagClass = `tag lec-${q.lec.toLowerCase()}`;

  if (mode === "flashcard") {
    area.innerHTML = `
      <div class="meta-row">
        <span class="${lecTagClass}">${q.lec}</span>
        <span class="tag">${q.topic}</span>
        <span class="tag ${q.type}">${q.type}</span>
      </div>
      <div class="question">${escapeHtml(q.q)}</div>
      <div id="ans" class="answer-box hidden">${escapeHtml(q.a)}</div>
      <div class="actions" id="card-actions">
        <button class="btn" id="reveal">Show answer</button>
        <button class="btn ghost" id="next-only">Skip â†’</button>
      </div>
    `;
    $("reveal").onclick = () => {
      $("ans").classList.remove("hidden");
      $("card-actions").innerHTML = `
        <button class="btn good" id="got-it">Got it âœ“</button>
        <button class="btn bad" id="missed-it">Missed it âœ—</button>
        <button class="btn ghost" id="next-only">Next â†’</button>
      `;
      $("got-it").onclick = () => { stats.correct++; advance(); };
      $("missed-it").onclick = () => { stats.wrong++; advance(); };
      $("next-only").onclick = () => advance();
    };
    $("next-only").onclick = () => advance();
  } else {
    // Quiz mode (multiple choice)
    const opts = shuffle([q.a, ...(q.distractors || [])]);
    area.innerHTML = `
      <div class="meta-row">
        <span class="${lecTagClass}">${q.lec}</span>
        <span class="tag">${q.topic}</span>
        <span class="tag ${q.type}">${q.type}</span>
      </div>
      <div class="question">${escapeHtml(q.q)}</div>
      <div class="options" id="opts">
        ${opts.map((o, i) => `<button class="option" data-val="${escapeAttr(o)}">${escapeHtml(o)}</button>`).join("")}
      </div>
      <div class="feedback" id="fb"></div>
      <div class="actions">
        <button class="btn" id="next">Next â†’</button>
      </div>
    `;
    answered = false;
    document.querySelectorAll('#opts .option').forEach(btn => {
      btn.onclick = () => {
        if (answered) return;
        answered = true;
        const val = btn.dataset.val;
        const correct = (val === q.a);
        document.querySelectorAll('#opts .option').forEach(b => {
          b.disabled = true;
          if (b.dataset.val === q.a) b.classList.add("correct");
          else if (b === btn) b.classList.add("wrong");
        });
        const fb = $("fb");
        if (correct) {
          stats.correct++;
          fb.textContent = "Correct âœ“";
          fb.className = "feedback good";
        } else {
          stats.wrong++;
          fb.textContent = "Not quite. Correct answer is highlighted.";
          fb.className = "feedback bad";
        }
        renderStats();
      };
    });
    $("next").onclick = () => advance();
  }
}

function advance() {
  pos = (pos + 1) % pool.length;
  if (pos === 0) pool = shuffle(pool); // reshuffle on wrap
  renderCard();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// =====================================================================
// EVENT WIRING
// =====================================================================
$("mode-flashcard").onclick = () => {
  mode = "flashcard";
  $("mode-flashcard").classList.add("active");
  $("mode-quiz").classList.remove("active");
  renderCard();
};
$("mode-quiz").onclick = () => {
  mode = "quiz";
  $("mode-quiz").classList.add("active");
  $("mode-flashcard").classList.remove("active");
  renderCard();
};
$("shuffle-btn").onclick = () => { pool = shuffle(pool); pos = 0; renderCard(); };
$("reset-btn").onclick = () => {
  stats = { correct: 0, wrong: 0, seen: 0 };
  pos = 0;
  pool = shuffle(pool);
  renderCard();
};

// Initial render
rebuild();
</script>
